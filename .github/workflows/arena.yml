name: arena

on:
  issues:
    types: [opened]

permissions:
  contents: write
  issues: write

jobs:
  verify:
    if: startsWith(github.event.issue.title, 'arena:')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract login (strict — title is untrusted input)
        id: entrant
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          LOGIN=$(printf '%s' "$TITLE" | sed -nE 's/^arena:[[:space:]]*@?([A-Za-z0-9][A-Za-z0-9-]{0,38})[[:space:]]*$/\1/p')
          if [ -z "$LOGIN" ]; then
            echo "invalid=1" >> "$GITHUB_OUTPUT"
          else
            echo "login=$LOGIN" >> "$GITHUB_OUTPUT"
          fi
      - name: Reject malformed entries
        if: steps.entrant.outputs.invalid == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment ${{ github.event.issue.number }} --body "Entry format: title must be exactly \`arena: your-login\`. Edit the title or open a new issue."
          exit 0
      - uses: actions/setup-python@v5
        if: steps.entrant.outputs.login != ''
        with:
          python-version: "3.12"
      - name: Verify the entrant against the live API
        if: steps.entrant.outputs.login != ''
        env:
          GITHUB_TOKEN: ${{ github.token }}
          ENTRANT: ${{ steps.entrant.outputs.login }}
        run: |
          pip install -q -e .
          laurea arena --login "$ENTRANT"
      - name: Commit the verified row
        if: steps.entrant.outputs.login != ''
        env:
          GH_TOKEN: ${{ github.token }}
          ENTRANT: ${{ steps.entrant.outputs.login }}
        run: |
          git config user.name "laurea[bot]"
          git config user.email "actions@github.com"
          git add LEADERBOARD.md
          git diff --cached --quiet || { git commit -m "arena: verified @$ENTRANT"; git pull --rebase; git push; }
          gh issue comment ${{ github.event.issue.number }} --body "Verified from the live public API and entered: see [LEADERBOARD.md](../blob/main/LEADERBOARD.md). Same floors, same citations, same rules as everyone — welcome to the arena, @$ENTRANT."
          gh issue close ${{ github.event.issue.number }}
